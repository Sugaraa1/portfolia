<h1>My Portfolio</h1>

<div id="projects"></div>
<div id="skills"></div>

<!-- Supabase library -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
        <script src="script.js"></script>
<script>


// 2. Load function
async function load() {

  const { data: p, error: pe } = await supabaseClient
    .from('projects')
    .select('*');

  const { data: s, error: se } = await supabaseClient
    .from('skills')
    .select('*');

  console.log(p, s);

  document.getElementById("projects").innerHTML =
    (p || []).map(x => `<p>${x.title}</p>`).join("");

  document.getElementById("skills").innerHTML =
    (s || []).map(x => `<p>${x.skill_name}</p>`).join("");
}

// 3. Run
load();
</script>
