<!DOCTYPE html>
<html lang="mn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Megi</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%231a1a2e'/><text y='72' x='50' text-anchor='middle' font-family='monospace' font-weight='700' font-size='42' fill='%23a78bfa'>&lt;/&gt;</text></svg>?v=2">
</head>
<body>

<div class="bg-orbs">
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="orb orb3"></div>
</div>

<nav class="nav">
  <div class="nav-logo"><span>Megi</span></div>
  <div class="nav-links">
    <a href="#about">About</a>
    <a href="#skills">Skills</a>
    <a href="#projects">Projects</a>
    <a href="#contact">Contact</a>
  </div>
  <button class="lang-toggle" onclick="toggleLang()" id="langBtn">EN</button>
</nav>

<section class="hero" id="about">
  <h1 class="hero-name">
    <span class="line1" data-mn="Сайн уу," data-en="Hello,">Сайн уу,</span><br>
    <span class="line2" data-mn="Би бол" data-en="I'm a">Би бол</span>
    <span class="highlight" data-mn="программ хангаммжийн оюутан" data-en="software engineering student">программ хангаммжийн оюутан</span>
  </h1>
  <div class="hero-cta">
    <a href="#projects" class="btn-primary" data-mn="Төслүүд харах" data-en="View Projects">Төслүүд харах</a>
    <a href="#contact" class="btn-ghost" data-mn="Холбоо барих" data-en="Contact Me">Холбоо барих</a>
  </div>
  <div class="social-row" id="socialLinks"></div>
</section>

<section class="section" id="skills">
  <div class="section-label" data-mn="Чадварууд" data-en="Skills">Чадварууд</div>
  <h2 class="section-title" data-mn="Би юу хийж чаддаг вэ?" data-en="What can I do?">Би юу хийж чаддаг вэ?</h2>
  <div class="skills-grid" id="skillsGrid">
    <div class="skill-placeholder"></div>
  </div>
</section>

<section class="section" id="projects">
  <div class="section-label" data-mn="Төслүүд" data-en="Projects">Төслүүд</div>
  <h2 class="section-title" data-mn="Миний бүтээлүүд" data-en="My Work">Миний бүтээлүүд</h2>
  <div class="projects-grid" id="projectsGrid">
    <div class="project-placeholder"></div>
  </div>
</section>

<section class="section" id="contact">
  <div class="section-label" data-mn="Холбоо барих" data-en="Contact">Холбоо барих</div>
  <h2 class="section-title" data-mn="Надтай холбогдоорой" data-en="Get in touch">Надтай холбогдоорой</h2>
  <div class="contact-box">
    <div class="contact-info" id="contactInfo">
      <div class="contact-item">
        <span class="contact-icon">✉</span>
        <span id="contactEmail">—</span>
      </div>
      <div class="contact-item">
        <span class="contact-icon">✆</span>
        <span id="contactPhone">—</span>
      </div>
      <div class="contact-item">
        <span class="contact-icon">⚲</span>
        <span id="contactAddress">—</span>
      </div>
    </div>
    <div class="contact-deco">
      <div class="deco-circle"></div>
    </div>
  </div>
</section>

<footer class="footer">
  &nbsp;·&nbsp;
  <a href="admin.html" data-mn="Админ" data-en="Admin">Админ</a>
</footer>

<!-- Project Modal -->
<div id="projectModal" class="modal-overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal-box">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="modal-scroll-area">
      <div class="modal-num" id="modalNum"></div>
      <h2 class="modal-title" id="modalTitle"></h2>
      <p class="modal-desc" id="modalDesc"></p>
      <a id="modalLink" class="modal-link" target="_blank" rel="noopener">
        <span data-mn="Харах" data-en="View">Харах</span> ↗
      </a>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="script.js"></script>
<script>
// ---- LANG ----
let currentLang = 'mn';
function toggleLang() {
  currentLang = currentLang === 'mn' ? 'en' : 'mn';
  document.getElementById('langBtn').textContent = currentLang === 'mn' ? 'EN' : 'МН';
  document.querySelectorAll('[data-mn]').forEach(el => {
    el.textContent = el.dataset[currentLang];
  });
}

// ---- PROJECTS ----
let allProjects = [];

// Тайлбарыг хураангуйлах — 100 тэмдэгтээс хэтэрвэл ... нэмнэ
function truncate(str, len = 100) {
  if (!str) return '';
  return str.length > len ? str.slice(0, len).trimEnd() + '…' : str;
}

// ---- MODAL ----
function openModal(index) {
  const p = allProjects[index];
  if (!p) return;
  document.getElementById('modalNum').textContent = `0${index + 1} · Төсөл`;
  document.getElementById('modalTitle').textContent = p.title;
  document.getElementById('modalDesc').textContent = p.description || 'Тайлбар байхгүй байна.';
  const linkEl = document.getElementById('modalLink');
  if (p.url) {
    linkEl.href = p.url;
    linkEl.style.display = 'inline-flex';
  } else {
    linkEl.style.display = 'none';
  }
  // scroll дээшлүүлэх
  const sa = document.querySelector('.modal-scroll-area');
  if (sa) sa.scrollTop = 0;

  document.getElementById('projectModal').classList.add('modal-active');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('projectModal').classList.remove('modal-active');
  document.body.style.overflow = '';
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

// ---- LOAD DATA ----
async function load() {
  // Projects
  const { data: projects } = await supabaseClient.from('projects').select('*');
  allProjects = projects || [];
  const pg = document.getElementById('projectsGrid');
  if (allProjects.length > 0) {
    pg.innerHTML = allProjects.map((p, i) => `
      <div class="project-card" onclick="openModal(${i})" role="button" tabindex="0"
           onkeydown="if(event.key==='Enter')openModal(${i})">
        <div class="project-num">0${i + 1}</div>
        <h3>${p.title}</h3>
        <p class="project-desc">${truncate(p.description)}</p>
        <span class="project-link" data-mn="Дэлгэрэнгүй харах" data-en="View Details">Дэлгэрэнгүй харах</span>
      </div>
    `).join('');
  } else {
    pg.innerHTML = '<p class="empty-msg">Одоогоор төсөл байхгүй байна</p>';
  }

  // Skills
  const { data: skills } = await supabaseClient.from('skills').select('*').order('sort_order');
  const sg = document.getElementById('skillsGrid');
  if (skills && skills.length > 0) {
    sg.innerHTML = skills.map(s => `<div class="skill-chip">${s.skill_name}</div>`).join('');
  } else {
    sg.innerHTML = '<p class="empty-msg">Одоогоор чадвар байхгүй байна</p>';
  }

  // Contact
  const { data: contact } = await supabaseClient.from('contact_info').select('*').eq('id', 1).single();
  if (contact) {
    document.getElementById('contactEmail').textContent = contact.email || '—';
    document.getElementById('contactPhone').textContent = contact.phone || '—';
    document.getElementById('contactAddress').textContent = contact.address || '—';
  }
}

load();
</script>
</body>
</html>
