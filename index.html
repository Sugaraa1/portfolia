<!DOCTYPE html>
<html lang="mn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Megi</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%231a1a2e'/><text y='72' x='50' text-anchor='middle' font-family='monospace' font-weight='700' font-size='42' fill='%23a78bfa'>&lt;/&gt;</text></svg>?v=2">
</head>
<body>

<!-- Background -->
<div class="bg-orbs">
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="orb orb3"></div>
</div>

<!-- Nav -->
<nav class="nav">
  <div class="nav-logo"><span>Megi</span></div>
  <div class="nav-links">
    <a href="#about">About</a>
    <a href="#skills">Skills</a>
    <a href="#projects">Projects</a>
    <a href="#contact">Contact</a>
  </div>
  <button class="lang-toggle" onclick="toggleLang()" id="langBtn">EN</button>
</nav>

<!-- Hero -->
<section class="hero" id="about">
  <h1 class="hero-name">
    <span class="line1" data-mn="Сайн уу," data-en="Hello,">Сайн уу,</span><br>
    <span class="line2" data-mn="Би бол" data-en="I'm a">Би бол</span>
    <span class="highlight" id="heroRole" data-mn="программ хангаммжийн оюутан" data-en="software engineering student">программ хангаммжийн оюутан</span>
  </h1>
 
  <div class="hero-cta">
    <a href="#projects" class="btn-primary" data-mn="Төслүүд харах" data-en="View Projects">Төслүүд харах</a>
    <a href="#contact" class="btn-ghost" data-mn="Холбоо барих" data-en="Contact Me">Холбоо барих</a>
  </div>
  <div class="social-row" id="socialLinks">
    <!-- loaded from supabase -->
  </div>
</section>

<!-- Skills -->
<section class="section" id="skills">
  <div class="section-label" data-mn="Чадварууд" data-en="Skills">Чадварууд</div>
  <h2 class="section-title" data-mn="Би юу хийж чаддаг вэ?" data-en="What can I do?">Би юу хийж чаддаг вэ?</h2>
  <div class="skills-grid" id="skillsGrid">
    <div class="skill-placeholder"></div>
  </div>
</section>

<!-- Projects -->
<section class="section" id="projects">
  <div class="section-label" data-mn="Төслүүд" data-en="Projects">Төслүүд</div>
  <h2 class="section-title" data-mn="Миний бүтээлүүд" data-en="My Work">Миний бүтээлүүд</h2>
  <div class="projects-grid" id="projectsGrid">
    <div class="project-placeholder"></div>
  </div>
</section>

<!-- Contact -->
<section class="section" id="contact">
  <div class="section-label" data-mn="Холбоо барих" data-en="Contact">Холбоо барих</div>
  <h2 class="section-title" data-mn="Надтай холбогдоорой" data-en="Get in touch">Надтай холбогдоорой</h2>
  <div class="contact-box">
    <div class="contact-info" id="contactInfo">
      <div class="contact-item">
        <span class="contact-icon">✉</span>
        <span id="contactEmail">—</span>
      </div>
      <div class="contact-item">
        <span class="contact-icon">✆</span>
        <span id="contactPhone">—</span>
      </div>
      <div class="contact-item">
        <span class="contact-icon">⚲</span>
        <span id="contactAddress">—</span>
      </div>
    </div>
    <div class="contact-deco">
      <div class="deco-circle"></div>
    </div>
  </div>
</section>

<!-- Footer -->
<footer class="footer">
  &nbsp;·&nbsp;
  <a href="admin.html" data-mn="Админ" data-en="Admin">Админ</a>
</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="script.js"></script>
<script>
// ---- LANG ----
let currentLang = 'mn';
function toggleLang() {
  currentLang = currentLang === 'mn' ? 'en' : 'mn';
  document.getElementById('langBtn').textContent = currentLang === 'mn' ? 'EN' : 'МН';
  document.querySelectorAll('[data-mn]').forEach(el => {
    el.textContent = el.dataset[currentLang];
  });
}

// ---- LOAD DATA ----
async function load() {
  // Projects
  const { data: projects } = await supabaseClient.from('projects').select('*');
  const pg = document.getElementById('projectsGrid');
  if (projects && projects.length > 0) {
    pg.innerHTML = projects.map(p => `
      <div class="project-card">
        <div class="project-num">0${projects.indexOf(p)+1}</div>
        <h3>${p.title}</h3>
        <p>${p.description || ''}</p>
        ${p.url ? `<a href="${p.url}" target="_blank" class="project-link" data-mn="Харах" data-en="View">Харах</a>` : ''}
      </div>
    `).join('');
  } else {
    pg.innerHTML = '<p class="empty-msg">Одоогоор төсөл байхгүй байна</p>';
  }

  // Skills
  const { data: skills } = await supabaseClient.from('skills').select('*').order('sort_order');
  const sg = document.getElementById('skillsGrid');
  if (skills && skills.length > 0) {
    sg.innerHTML = skills.map(s => `
      <div class="skill-chip">${s.skill_name}</div>
    `).join('');
  } else {
    sg.innerHTML = '<p class="empty-msg">Одоогоор чадвар байхгүй байна</p>';
  }

  // Contact
  const { data: contact } = await supabaseClient.from('contact_info').select('*').eq('id', 1).single();
  if (contact) {
    document.getElementById('contactEmail').textContent = contact.email || '—';
    document.getElementById('contactPhone').textContent = contact.phone || '—';
    document.getElementById('contactAddress').textContent = contact.address || '—';
  }
}

load();
</script>
</body>
</html>
